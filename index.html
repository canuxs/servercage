<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Servercage | Cloud Editor</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; padding: 20px; }
        textarea { width: 100%; height: 300px; background: #161b22; color: #79c0ff; border: 1px solid #30363d; padding: 10px; font-family: monospace; }
        .btn { padding: 10px 20px; cursor: pointer; background: #238636; color: white; border: none; border-radius: 6px; }
        #main-panel { display: none; }
    </style>
</head>
<body>

    <div id="auth-section">
        <button class="btn" id="loginBtn">Login with Google</button>
    </div>

    <div id="main-panel">
        <h1>Servercage Editor</h1>
        
        <div id="create-area">
            <input type="text" id="sName" placeholder="Service Name...">
            <button class="btn" onclick="createService()">Create New Site</button>
        </div>

        <div id="editor-section" style="margin-top: 20px; display: none;">
            <h3>Editing: <span id="current-site-name"></span></h3>
            <textarea id="codeEditor" placeholder="Write your HTML/Text here..."></textarea><br><br>
            <button class="btn" onclick="saveCode()">Save & Publish</button>
            <p id="statusMsg"></p>
            <a id="liveLink" target="_blank" style="color: #58a6ff;"></a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "YOUR_ACTUAL_API_KEY", // BURAYI DOLDURMAYI UNUTMA
            authDomain: "servercage.firebaseapp.com",
            databaseURL: "https://servercage-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "servercage"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        document.getElementById('loginBtn').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('main-panel').style.display = 'block';
                checkUserSite(user.uid);
            }
        });

        let currentServiceId = null;

        function checkUserSite(uid) {
            db.ref('services').orderByChild('owner').equalTo(uid).on('value', snap => {
                const data = snap.val();
                if (data) {
                    currentServiceId = Object.keys(data)[0];
                    const sData = data[currentServiceId];
                    document.getElementById('create-area').style.display = 'none';
                    document.getElementById('editor-section').style.display = 'block';
                    document.getElementById('current-site-name').innerText = sData.name;
                    document.getElementById('codeEditor').value = sData.content || "";
                    document.getElementById('liveLink').href = `service.html?id=${currentServiceId}`;
                    document.getElementById('liveLink').innerText = "View Live Site";
                }
            });
        }

        function createService() {
            const name = document.getElementById('sName').value;
            if(!name) return;
            db.ref('services').push({
                name: name,
                owner: auth.currentUser.uid,
                status: "active",
                user_engagement: 0,
                content: "<h1>Hello World</h1>", // Default content
                last_update: Date.now()
            });
        }

        function saveCode() {
            const newContent = document.getElementById('codeEditor').value;
            if(!currentServiceId) return;

            db.ref('services/' + currentServiceId).update({
                content: newContent,
                last_update: Date.now()
            }).then(() => {
                document.getElementById('statusMsg').innerText = "Saved successfully!";
                setTimeout(() => document.getElementById('statusMsg').innerText = "", 2000);
            });
        }
    </script>
</body>
</html>
