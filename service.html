<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Servercage View</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
</head>
<body style="background: #0d1117; color: white; text-align: center; padding-top: 50px;">
    <div id="display">Loading...</div>

    <script>
        firebase.initializeApp({ databaseURL: "https://servercage-default-rtdb.europe-west1.firebasedatabase.app/" });
        const db = firebase.database();
        const sId = new URLSearchParams(window.location.search).get('id');

        if (sId) {
            const sRef = db.ref('services/' + sId);

            // Ziyaretçiyi kaydet (+1 Puan)
            sRef.child('user_engagement').transaction(c => (c || 0) + 1);

            // Durumu kontrol et
            sRef.on('value', snap => {
                const data = snap.val();
                const box = document.getElementById('display');
                
                if (data.status === "offline") {
                    box.innerHTML = "<h1>⚠️ Site Suspended</h1><p>Engagement was below 20.</p>";
                } else if (data.status === "relaunching") {
                    box.innerHTML = "<h1>⏳ Relaunching...</h1><p>Please wait 24 hours.</p>";
                } else {
                    box.innerHTML = `<h1>${data.name}</h1><p>Views: ${data.user_engagement}</p>`;
                }
            });
        }
    </script>
</body>
</html>
