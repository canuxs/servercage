<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
</head>
<body>
    <div id="render-point">Loading...</div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://servercage-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const sId = new URLSearchParams(window.location.search).get('id');

        if (sId) {
            const sRef = db.ref('services/' + sId);

            // Engagement logic
            sRef.child('user_engagement').transaction(c => (c || 0) + 1);

            sRef.on('value', snap => {
                const data = snap.val();
                if (!data) return document.body.innerHTML = "404 Not Found";

                if (data.status === "active") {
                    // Veritabanındaki kodu direkt sayfaya basıyoruz
                    document.open();
                    document.write(data.content || "No content yet.");
                    document.close();
                } else {
                    document.body.innerHTML = "<h1>Site is Offline</h1>";
                }
            });
        }
    </script>
</body>
</html>
